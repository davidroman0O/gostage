syntax = "proto3";

package gostage;

option go_package = "github.com/davidroman0O/gostage/proto";

// WorkflowIPC service defines the communication between parent and child processes.
// Pull model: child connects to parent's gRPC server, requests work, returns results.
service WorkflowIPC {
  // Child requests workflow definition from parent
  rpc RequestWorkflowDefinition(ReadySignal) returns (WorkflowDefinition);

  // Send a single message from child to parent (IPC, final store, results)
  rpc SendMessage(IPCMessage) returns (MessageAck);
}

// Message metadata for tracing
message MessageContext {
  string workflow_id = 1;
  string stage_id = 2;
  string action_name = 3;
  int32 process_id = 4;
  bool is_child_process = 5;
  int32 action_index = 6;
  bool is_last_action = 7;
  string session_id = 8;
  int64 sequence_number = 9;
}

// Main message wrapper with metadata
message IPCMessage {
  MessageType type = 1;
  oneof payload {
    StorePutPayload store_put = 11;
    WorkflowResultPayload workflow_result = 14;
    FinalStorePayload final_store = 15;
  }

  string message_id = 20;
  int64 timestamp = 21;
  MessageContext context = 22;
}

// Message types for parent-child IPC
enum MessageType {
  MESSAGE_TYPE_UNSPECIFIED = 0;
  MESSAGE_TYPE_STORE_PUT = 2;
  MESSAGE_TYPE_WORKFLOW_RESULT = 5;
  MESSAGE_TYPE_FINAL_STORE = 6;
}

// StorePutPayload carries key-value data or IPC messages from child Send() calls.
message StorePutPayload {
  string key = 1;
  bytes value = 2;
  string value_type = 3;
}

// WorkflowResultPayload carries error results from child processes.
message WorkflowResultPayload {
  string workflow_id = 1;
  bool success = 2;
  string error_message = 3;
  int64 execution_time_ms = 4;
}

// FinalStorePayload carries the child's dirty store entries back to parent.
message FinalStorePayload {
  map<string, bytes> store_data = 1;
  map<string, string> type_info = 2;
}

// MessageAck acknowledges receipt of a message.
message MessageAck {
  bool success = 1;
  string error_message = 2;
  string message_id = 3;
}

// WorkflowDefinition carries the work assignment from parent to child.
message WorkflowDefinition {
  string id = 1;
  string name = 2;
  bytes definition_json = 3;
  map<string, bytes> initial_store = 4;
}

// ReadySignal is sent by child to request its work assignment.
message ReadySignal {
  string child_id = 1;
}
