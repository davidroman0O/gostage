# sqlc configuration generated for Gostage v3
version: "2"
sql:
  - schema: "../migrations"
    queries: "queries"
    engine: "sqlite"
    gen:
      go:
        package: "sqlc"
        out: "."
        emit_json_tags: true
        emit_interface: false
        emit_prepared_queries: true
        emit_exact_table_names: false
